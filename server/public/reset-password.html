<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — School Management Software</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#16233F; --navy-2:#1E3050; --wood:#7B4B2A; --parchment:#F4EEDD; --brass:#B08D57; --brass-light:#D9C69A;
  --forest:#33513E; --rust:#A6432B; --ink:#2A2420; --ink-soft:#5B5346; --line:#D9CBA8; --white:#FFFDF8;
}
*{box-sizing:border-box;}
body{margin:0; font-family:'Inter',sans-serif; background:linear-gradient(160deg, rgba(22,35,63,0.92) 0%, rgba(94,58,32,0.75) 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--ink);}
h1{font-family:'Fraunces',serif; color:var(--navy); font-size:22px; margin:0 0 4px 0;}
.card{background:var(--parchment); border-radius:14px; padding:34px; width:100%; max-width:420px; box-shadow:0 30px 80px rgba(0,0,0,0.4); border:1px solid rgba(217,198,154,0.6);}
.tagline{font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; margin-bottom:22px;}
.form-field{margin-bottom:14px;}
.form-field label{display:block; font-size:12px; font-weight:600; color:#5E3A20; margin-bottom:5px;}
.form-field input{width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:6px; font-size:13.5px; background:var(--white); font-family:inherit; outline:none;}
.form-field input:focus{border-color:var(--brass);}
.password-wrap{position:relative;}
.password-wrap input{padding-right:38px !important;}
.eye-toggle{position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; padding:4px; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); cursor:pointer;}
.eye-toggle svg{width:17px; height:17px;}
.eye-toggle:hover{color:var(--navy);}
.password-hint{font-size:11px; color:var(--ink-soft); margin-top:-9px; margin-bottom:13px;}
.btn{width:100%; padding:12px; border:none; border-radius:6px; background:var(--navy); color:var(--brass-light); font-weight:600; font-size:13.5px; cursor:pointer;}
.btn:hover{background:var(--navy-2);}
.btn[disabled]{opacity:0.6; cursor:default;}
.msg{border-radius:7px; padding:10px 12px; font-size:12.5px; margin-bottom:14px; display:none;}
.msg.error{background:#F3DAD3; color:var(--rust); border:1px solid rgba(166,67,43,0.3);}
.msg.success{background:#DEEAE1; color:var(--forest); border:1px solid rgba(51,81,62,0.3);}
a{color:var(--wood); font-weight:600;}
.note{font-size:11.5px; color:var(--ink-soft); margin-top:16px; line-height:1.5;}
</style>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <div class="tagline">SCHOOL MANAGEMENT SOFTWARE</div>
    <div class="msg error" id="msgError"></div>
    <div class="msg success" id="msgSuccess"></div>
    <div id="formWrap">
      <div class="form-field"><label>New password</label><div class="password-wrap"><input type="password" id="pw1" placeholder="At least 8 characters"><button type="button" class="eye-toggle" onclick="togglePw('pw1', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <p class="password-hint">Must be at least 8 characters and include both letters and numbers.</p>
      <div class="form-field"><label>Confirm new password</label><div class="password-wrap"><input type="password" id="pw2" placeholder="Re-enter new password"><button type="button" class="eye-toggle" onclick="togglePw('pw2', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <button class="btn" id="submitBtn" onclick="submitReset()">Set new password</button>
    </div>
    <p class="note">Once your password is reset, return to the <a href="/">sign-in page</a> to log in.</p>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

function showError(msg){
  document.getElementById('msgError').textContent = msg;
  document.getElementById('msgError').style.display = 'block';
  document.getElementById('msgSuccess').style.display = 'none';
}
function showSuccess(msg){
  document.getElementById('msgSuccess').textContent = msg;
  document.getElementById('msgSuccess').style.display = 'block';
  document.getElementById('msgError').style.display = 'none';
}

if(!token){
  showError('This reset link is missing its token. Please request a new one from the sign-in page.');
  document.getElementById('formWrap').style.display = 'none';
}

function togglePw(inputId, btn){
  const input = document.getElementById(inputId);
  const showing = input.type === 'text';
  input.type = showing ? 'password' : 'text';
  btn.innerHTML = showing
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-7-11-7a20.3 20.3 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 7 11 7a20.3 20.3 0 01-2.68 3.88M14.12 14.12a3 3 0 11-4.24-4.24"/><path d="M1 1l22 22"/></svg>';
}

async function submitReset(){
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if(!pw1 || !pw2){ showError('Enter and confirm your new password.'); return; }
  if(pw1.length < 8){ showError('Password must be at least 8 characters.'); return; }
  if(!/[a-zA-Z]/.test(pw1) || !/[0-9]/.test(pw1)){ showError('Password must contain both letters and numbers.'); return; }
  if(pw1 !== pw2){ showError('Passwords do not match.'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  try{
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password: pw1 })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Could not reset password.');
    showSuccess(data.message || 'Password reset successfully.');
    document.getElementById('formWrap').style.display = 'none';
  }catch(err){
    showError(err.message);
  }finally{
    btn.disabled = false;
  }
}
</script>
</body>
</html>
